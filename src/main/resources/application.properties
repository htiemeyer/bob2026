# HTTP
quarkus.http.port=8080

# Dev-Mode Konsole
quarkus.console.color=true

# Logging-Hinweise f³r "Blocker"
quarkus.log.category."io.quarkus.vertx.http.runtime".level=DEBUG

########################################
# Allgemein
########################################
quarkus.application.name=ticketing
quarkus.log.category."org.hibernate.SQL".level=DEBUG

########################################
# Reactive Datasource (Dev-Mode)
########################################
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.devservices.enabled=true
# Optional: bestimmtes Image/Port
%dev.quarkus.datasource.devservices.image-name=postgres:16
%dev.quarkus.datasource.devservices.port=5432

# WICHTIG: im Dev-Profil KEINE eigene URL/User/Passwort setzen,
# damit Dev Services automatisch konfiguriert.[web:307][web:318]

########################################
# Reactive Datasource (Test)
########################################
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:16
%test.quarkus.datasource.devservices.port=5432

########################################
# Reactive Datasource (Prod ? Beispiel mit fester DB)
########################################
%prod.quarkus.datasource.devservices.enabled=false
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=quarkus
%prod.quarkus.datasource.password=quarkus
%prod.quarkus.datasource.reactive.url=postgresql://localhost:5432/ticketing

########################################
# Hibernate ORM / Reactive
########################################
# Schema-Handling (nur Dev/Test automatisch)
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%prod.quarkus.hibernate-orm.schema-management.strategy=validate
# Import von Beispieldaten
%dev.quarkus.hibernate-orm.sql-load-script=import.sql
%test.quarkus.hibernate-orm.sql-load-script=import.sql

