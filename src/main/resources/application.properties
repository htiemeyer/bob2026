# HTTP
quarkus.http.port=8080

# H2 Dev DB (imperativ/blockierend)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:ticketing;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Dev-Mode Konsole
quarkus.console.color=true

# Logging-Hinweise f³r "Blocker"
quarkus.log.category."io.quarkus.vertx.http.runtime".level=DEBUG
